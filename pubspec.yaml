publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  provider: ^6.1.2
  go_router: ^14.6.2

  # Backend FastAPI (menggantikan Firebase)
  http: ^1.2.2

  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3

  file_picker: ^8.0.7
  csv: ^6.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.4
